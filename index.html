<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>God Garou | Is he tuff?</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #09090b; color: #fafafa; }
        .glass { background: rgba(18, 18, 21, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.05); }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #27272a; border-radius: 10px; }
        .grade-decimal { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8">

    <div class="max-w-5xl mx-auto">
        <header class="flex items-center justify-between mb-12 px-2">
            <div class="flex items-center gap-5">
                <div class="w-11 h-11 bg-zinc-800 rounded-xl flex items-center justify-center font-bold text-zinc-500 border border-zinc-700 shadow-xl overflow-hidden">
                    <img src="/static/logo.jpg" alt="G" class="w-full h-full object-cover" onerror="this.style.display='none'">
                </div>
                <div class="flex flex-col">
                    <h1 class="text-xl font-bold tracking-tight text-white leading-none">Is this tuff y'all?</h1>
                    <div class="flex items-center gap-2 mt-1.5">
                        <div class="relative flex h-2 w-2">
                            <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-20"></span>
                            <span class="relative inline-flex rounded-full h-2 w-2 bg-emerald-600"></span>
                        </div>
                        <span class="text-[10px] text-emerald-500 uppercase tracking-[0.15em] font-bold" id="status-text">Node Active</span>
                    </div>
                </div>
            </div>
            <button onclick="syncDB()" class="text-[10px] font-bold uppercase tracking-widest text-zinc-600 hover:text-emerald-400 transition-colors">
                [ Sync Database ]
            </button>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            <div class="lg:col-span-4 space-y-4">
                <div class="relative">
                    <input type="text" id="search-input" placeholder="Search student name..." 
                           class="w-full bg-zinc-900 border border-zinc-800 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-zinc-600 transition-all text-white">
                </div>

                <div id="results-list" class="space-y-2 overflow-y-auto max-h-[70vh]">
                    </div>
            </div>

            <div class="lg:col-span-8">
                <div id="details-pane" class="glass rounded-2xl p-6 min-h-[500px] flex flex-col items-start justify-start text-zinc-600 overflow-y-auto">
                    <div class="w-full h-full flex flex-col items-center justify-center py-40">
                        <p class="text-xs uppercase tracking-widest opacity-40">Select a student profile to decrypt</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const statusText = document.getElementById('status-text');
        const searchInput = document.getElementById('search-input');
        const resultsList = document.getElementById('results-list');
        const detailsPane = document.getElementById('details-pane');

        async function syncDB() {
            statusText.innerText = "Syncing Dump";
            statusText.classList.replace('text-emerald-500', 'text-zinc-500');
            await fetch('/api/sync', { method: 'POST' });
            setTimeout(() => { 
                statusText.innerText = "Node Active"; 
                statusText.classList.replace('text-zinc-500', 'text-emerald-500');
            }, 2000);
        }

        searchInput.addEventListener('input', async (e) => {
            const query = e.target.value.trim();
            if(query.length < 3) return;

            const res = await fetch(`/api/search?q=${query}`);
            const data = await res.json();

            resultsList.innerHTML = '';
            data.forEach(s => {
                const btn = document.createElement('button');
                btn.className = "w-full text-left p-4 rounded-xl bg-zinc-900/50 hover:bg-zinc-800 border border-zinc-800/50 transition-all group";
                btn.innerHTML = `
                    <div class="text-[10px] text-zinc-500 mb-1 font-mono uppercase tracking-tight">${s.id}</div>
                    <div class="text-sm font-semibold group-hover:text-white transition-colors">${s.name}</div>
                    <div class="text-[9px] text-zinc-600 mt-1">${s.cys} • ${s.status}</div>
                `;
                btn.onclick = () => loadGrades(s.id, s.name);
                resultsList.appendChild(btn);
            });
        });

        async function loadGrades(sid, name) {
            detailsPane.innerHTML = `
                <div class="w-full h-full flex flex-col items-center justify-center py-40">
                    <div class="animate-pulse text-[10px] tracking-[0.2em] uppercase text-zinc-400">Retrieving encrypted records...</div>
                </div>
            `;
            
            try {
                const res = await fetch(`/api/grades/${sid}`);
                const semesters = await res.json();

                let html = `<div class="w-full">
                    <div class="mb-10">
                        <h2 class="text-2xl font-bold text-white mb-1">${name}</h2>
                        <p class="text-zinc-500 text-xs font-mono tracking-tighter">${sid}</p>
                    </div>`;

                semesters.forEach(sem => {
                    html += `
                        <div class="mb-12">
                            <div class="flex justify-between items-end border-b border-zinc-800 pb-2 mb-6">
                                <h3 class="text-zinc-400 text-[10px] uppercase tracking-[0.2em] font-black">${sem.year} — ${sem.semester}</h3>
                                <div class="text-emerald-500 text-sm font-bold">GWA: ${sem.total_gwa}</div>
                            </div>
                            <div class="space-y-3">`;

                    sem.data.forEach(sub => {
                        html += `
                            <div class="group flex justify-between items-center p-4 rounded-xl bg-zinc-900/20 border border-zinc-800/40 hover:border-zinc-700 transition-all">
                                <div>
                                    <div class="text-xs font-semibold text-zinc-300 group-hover:text-white">${sub.desc}</div>
                                    <div class="flex gap-3 items-center mt-1">
                                        <span class="text-[9px] text-zinc-500 font-mono">${sub.code}</span>
                                        <span class="text-[9px] text-zinc-600 italic truncate max-w-[120px]">${sub.prof}</span>
                                    </div>
                                </div>
                                <div class="flex gap-6 items-center text-right">
                                    <div class="hidden md:block text-[9px] text-zinc-600 font-mono leading-tight">
                                        M: ${sub.mid} <br> F: ${sub.fin}
                                    </div>
                                    <div class="text-lg font-black grade-decimal ${sub.gwa === 'INC' ? 'text-rose-500' : 'text-emerald-400'}">
                                        ${sub.gwa}
                                    </div>
                                </div>
                            </div>`;
                    });

                    html += `</div></div>`;
                });

                detailsPane.innerHTML = html + `</div>`;
            } catch (err) {
                detailsPane.innerHTML = '<div class="w-full h-full flex items-center justify-center py-40 text-rose-500 uppercase text-[10px] tracking-widest">Connection Interrupted</div>';
            }
        }
    </script>
</body>
</html>
