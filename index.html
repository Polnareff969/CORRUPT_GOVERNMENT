<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>God Garou | Is he tuff?</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #09090b; color: #fafafa; }
        .glass { background: rgba(18, 18, 21, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.05); }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #27272a; border-radius: 10px; }
        .btn-sync { background: rgba(39, 39, 42, 0.5); border: 1px solid rgba(255,255,255,0.05); transition: all 0.2s; }
        .btn-sync:hover { background: #27272a; border-color: #3f3f46; transform: translateY(-1px); }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8">
    <div class="max-w-5xl mx-auto">
        <header class="flex items-center justify-between mb-12 px-2">
            <div class="flex items-center gap-5">
                <div class="w-11 h-11 bg-zinc-800 rounded-xl border border-zinc-700 shadow-xl overflow-hidden">
                    <img src="/static/logo.jpg" alt="G" class="w-full h-full object-cover">
                </div>
                <div class="flex flex-col">
                    <h1 class="text-xl font-bold tracking-tight text-white leading-none">Is this tuff y'all?</h1>
                    <div class="flex items-center gap-2 mt-1.5">
                        <div class="relative flex h-2 w-2">
                            <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-20"></span>
                            <span class="relative inline-flex rounded-full h-2 w-2 bg-emerald-600"></span>
                        </div>
                        <span class="text-[10px] text-emerald-500 uppercase tracking-[0.15em] font-bold" id="status-text">Node Active</span>
                    </div>
                </div>
            </div>
            <button onclick="syncDB()" class="btn-sync px-4 py-2 rounded-lg text-[10px] font-bold uppercase tracking-widest text-zinc-400 flex items-center gap-2 shadow-lg">
                <div id="sync-spinner" class="hidden w-2 h-2 border-2 border-emerald-500 border-t-transparent rounded-full animate-spin"></div>
                Sync Database
            </button>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            <div class="lg:col-span-4 space-y-4">
                <input type="text" id="search-input" placeholder="Search name, ID, or course..." 
                       class="w-full bg-zinc-900 border border-zinc-800 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-zinc-600 transition-all text-white placeholder:text-zinc-600">
                <div id="results-list" class="space-y-2 overflow-y-auto max-h-[70vh]"></div>
            </div>
            <div class="lg:col-span-8">
                <div id="details-pane" class="glass rounded-2xl p-6 min-h-[500px] flex flex-col items-center justify-center text-zinc-600">
                    <p class="text-[10px] uppercase tracking-widest opacity-30">Selection Required</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        const statusText = document.getElementById('status-text');
        const spinner = document.getElementById('sync-spinner');

        async function syncDB() {
            spinner.classList.remove('hidden');
            statusText.innerText = "Synchronizing";
            await fetch('/api/sync', { method: 'POST' });
            setTimeout(() => { 
                spinner.classList.add('hidden');
                statusText.innerText = "Node Active"; 
                alert("Database updated in background. Try searching now.");
            }, 4000);
        }

        document.getElementById('search-input').addEventListener('input', async (e) => {
            const query = e.target.value.trim();
            if(query.length < 2) return;
            const res = await fetch(`/api/search?q=${query}`);
            const data = await res.json();
            document.getElementById('results-list').innerHTML = data.map(s => `
                <button onclick="loadGrades('${s.id}', '${s.name}')" class="w-full text-left p-4 rounded-xl bg-zinc-900/40 hover:bg-zinc-800 border border-zinc-800/50 transition-all group">
                    <div class="text-[10px] text-zinc-500 mb-1 font-mono">${s.id}</div>
                    <div class="text-sm font-semibold group-hover:text-white">${s.name}</div>
                    <div class="text-[9px] text-zinc-600 mt-1 uppercase">${s.cys}</div>
                </button>
            `).join('');
        });

        async function loadGrades(sid, name) {
            const pane = document.getElementById('details-pane');
            pane.innerHTML = '<div class="animate-pulse text-[10px] uppercase text-zinc-500">Decrypting...</div>';
            const res = await fetch(`/api/grades/${sid}`);
            const semesters = await res.json();
            let html = `<div class="w-full"><div class="mb-10"><h2 class="text-2xl font-bold text-white mb-1">${name}</h2><p class="text-zinc-500 text-xs font-mono">${sid}</p></div>`;
            semesters.forEach(sem => {
                html += `<div class="mb-12"><div class="flex justify-between border-b border-zinc-800 pb-2 mb-6"><h3 class="text-zinc-500 text-[10px] uppercase font-black">${sem.year} — ${sem.semester}</h3><div class="text-emerald-500 text-sm font-bold">GWA: ${sem.total_gwa}</div></div><div class="space-y-2">`;
                sem.data.forEach(sub => {
                    html += `<div class="flex justify-between items-center p-4 rounded-xl bg-zinc-900/30 border border-zinc-800/40"><div><div class="text-xs font-semibold text-zinc-300">${sub.desc}</div><div class="text-[9px] text-zinc-600 font-mono mt-1">${sub.code} • ${sub.prof}</div></div><div class="text-right flex items-center gap-6"><div class="hidden md:block text-[9px] text-zinc-600 font-mono">M:${sub.mid}<br>F:${sub.fin}</div><div class="text-lg font-black ${sub.gwa === 'INC' ? 'text-rose-500' : 'text-emerald-400'}">${sub.gwa}</div></div></div>`;
                });
                html += `</div></div>`;
            });
            pane.innerHTML = html + `</div>`;
        }
    </script>
</body>
</html>
